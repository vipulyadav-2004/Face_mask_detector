name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git with a temporary deployment identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push the current branch to your Hugging Face Space remote
          # ⚠️ REPLACE 'your-username/your-space-name' below with your actual details
          git push --force https://actions:$HF_TOKEN@huggingface.co/spaces/your-username/your-space-name master